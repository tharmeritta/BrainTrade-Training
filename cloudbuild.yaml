steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/app/braintrade-training:$COMMIT_SHA',
      '.'
    ]
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/app/braintrade-training:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'braintrade-training'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/app/braintrade-training:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
