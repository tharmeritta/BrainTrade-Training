# Firebase App Hosting configuration
# Documentation: https://firebase.google.com/docs/app-hosting/configure

env:
  # Admin Fallback Credentials
  - variable: ADMIN_USERNAME
    value: "Tharme Ritta"
  - variable: ADMIN_PASSWORD
    secret: admin-password
  
  # Session Configuration
  - variable: SESSION_SECRET
    secret: admin-password  # Updated as session-secret was removed from GCP

  # Firebase Admin SDK
  - variable: FIREBASE_PROJECT_ID
    value: "bt-training-firebase"
  - variable: FIREBASE_CLIENT_EMAIL
    value: "firebase-adminsdk-fbsvc@bt-training-firebase.iam.gserviceaccount.com"
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE-SECRET-KEY # Updated from firebase-private-key

  # AI Provider Keys
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY

  # Client-side Firebase Config (Public)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE-API-KEY # Updated from firebase-api-key
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "bt-training-firebase.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "bt-training-firebase"
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: "https://bt-training-firebase-default-rtdb.asia-southeast1.firebasedatabase.app/"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "bt-training-firebase.firebasestorage.app"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "723552528953"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:723552528953:web:c033c03310682e3ce2bbe8"
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-V82RGZ1M3C"
